много пъти\nДефиниция на функция:\nСъстои се от заглавие и тяло. \nЗаглавието се състои от:\n тип на връщаната от функцията стойност;\n име на функцията, което трябва да е валиден за езика идентификатор;\nсписък от параметри (наричат се формални параметри), заградени в кръгли скоби.\n\tТяло на функцията:\n\t{\n                оператор 1\n\t    оператор 2\n                  …\n                оператор N\n\t}\nПример: Дефиниция на функция за изчисляване а (реално число, различно от 0)  на степен n (n- произволно цяло число):\n\nfloat stepen (float a, int n)\n{\n   float P\u003d1;\n   int m,i;\n   if(n\u003e0)m\u003dn;else m\u003d-n;\n   for(i\u003d1;i\u003c\u003dm;i++)\n\t\tP\u003dP*a;\n   if(n\u003c0)P\u003d1/P;\n   return P;\t\n}\n\n\nИзвикване на функция за изпълнение\nФункцията се извиква с името си и списък от фактически параметри, като броят и типът на фактическите параметри трябва да съответства на броя и типа на формалните параметри.\nПример: Програма за изчисляване стойността на израза an +bk\nint main()\n{\n\tfloat a,b,s;\n\tint n,k;\n           do{\n\tprintf(“a\u003d”);\n\tscanf(“%f”,\u0026a);\n       }while(a\u003d\u003d0);\n       printf(“n\u003d”);\n       scanf(“%d”,\u0026n);\n       do{\n\tprintf(“b\u003d”);\n\tscanf(“%f”,\u0026b);\n       }while(b\u003d\u003d0);\n       printf(“k\u003d”);\n       scanf(“%d”,\u0026k);\n       s\u003dstepen(a,n)+stepen(b,k);\n       printf(“s\u003d%f”,s);\n       return 0;\n}\n\n\n\n\n2 задача. Да се състави функция, която извежда на екрана триъгълна фигура от символи. \nПример (5 реда от *):\n*\n* *\n* * *\n* * * *\n* * * * *\n#include\u003cstdio.h\u003e\nvoid fig(int n, char c)\n{\n  int i,k;\n  for(i\u003d1;i\u003c\u003dn;i++)\n {\n    for(k\u003d1;k\u003c\u003di;k++)\n\tprintf(“%2c”,c);\n   printf(“\\n”);\n }\n}\n\nint main()\n{\n    int n;char c;\n    printf(“n\u003d”);scanf(“%d”,\u0026n);\n    getchar();\n\n  c\u003dgetchar();\n  fig(n,c);\n  return 0;\n}\n\n\n\nПараметри на функции\nВ езика С параметрите се предават по стойност (наричат се параметри - стойности).\nПример: Да се състави функция за размяна на стойностите на две променливи\n\nако дефинираме следната функция:\n\nvoid change(int a,int b)\n{\n   int c;\n   c\u003da;\n   a\u003db;\n   b\u003dc;\n}\n\nи я извикаме в main():\n\nint main()\n{\n   int x\u003d12, y\u003d10;\n   change(x,y);\n   printf(“x\u003d%d  y\u003d%d”,x,y);\n   return 0;\n}\n\nще установим, че при извикването на функцията change(x,y),  функцията НЕ разменя стойностите на фактическите параметри x и y.\n\nОбяснение:\n\nИзпълнението на програмата започва от главната функция. Заделя се оперативна памет за променливите x и y.\n\nСъстояние на оперативната памет (ОП):\n------------------------------------------------------------------------------------------------------\nПреди извикване на функцията  change()     \tx\u003d12  y\u003d10\n------------------------------------------------------------------------------------------------------\nПо време на изпълнение на change()\t \tx\u003d12  y\u003d10\nЗаделя се допълнителна памет за формалните \nпараметри и стойностите на фактическите\nсе копират в съответните формални \nпараметри. Стойностите на формалните \nпараметри a и b се разменят, \t\t\tа\u003d10  b\u003d12\nно стойностите на фактическите x и y не се \nпроменят, защото функцията работи с техните \nкопия.\n------------------------------------------------------------------------------------------------------\nСлед извикване на функцията  change()       \tx\u003d12  y\u003d10\nПаметта, заделена за формалните параметри\nа и b и вътрешната променлива c се освобождава.\nОстават x и y със старите им стойности.\n\n\n2 вариант - функция за размяна на стойностите на две променливи с използване на външни променливи\nВъншни (глобални, нелокални) променливи - променливи, дефинирани извън тялото на която и да е функция. Област на действие на външните променливи - от точката на дефинирането им до края на файла, в който са дефинирани.\nВътрешни (локални) променливи 6b;//pb  получава като стойност адреса на променливата b - казва се, че pb сочи към b\nСлед тази инициализация:\nНавсякъде където се използва \u0026a може да се използва pa. \nНавсякъде където се използва \u0026b може да се използва pb.\nНавсякъде където се използва a може да се използва *pa.\nНавсякъде където се използва b може да се използва *pb.\n\nАко адресът на а е 0xff00 (примерно) променливата pa ще получи стойност 0xff00.\nАко адресът на b е 0xff04 (примерно) променливата pb ще получи стойност 0xff04\n\n\nПример:\nc\u003da;\na\u003db;\nb\u003dc;\nе еквивалентно на:\nc\u003d*pa;      //c получава стойността на променливата, към която сочи pa\n*pa\u003d*pb;  //променливата, към която сочи pa, получава стойността на променливата, към която сочи pb\n*pb\u003dc;     //променливата, към която сочи pb, получава стойността на променливата c\n\n\nvoid change(int *pa, int *pb) //формалните параметри се дефинират като указатели\n{\n   int c;\n   c\u003d*pa;      //c получава стойността на променливата, към която сочи pa\n   *pa\u003d*pb;  //променливата, към която сочи pa, получава стойността на променливата,                  към която сочи pb\n    *pb\u003dc;     //променливата, към която сочи pb, получава стойността на променливата c\n}\nint main()\n{\n   x\u003d12; y\u003d10;\n   change(\u0026x,\u0026y);//като фактически параметри се предават адресите на x и y\n   printf(“x\u003d%d  y\u003d%d”,x,y);\n   return 0;\n}\nИзвеждат се: x\u003d10 y\u003d12;\nT.e. функцията change(\u0026x,\u0026y) разменя стойностите на x и y.\nАко искаме функцията да размени стойностите на друга двойка променливи (например p и q) извикваме я с фактически параметри p и q:\nchange(\u0026p,\u0026q);\n\n\nСъстояние на оперативната памет (ОП):\n------------------------------------------------------------------------------------------------------\nПреди извикване на функцията  change()     \tx\u003d12  y\u003d10\n-----------------------------------------------------------------------------------
